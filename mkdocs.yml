# 主题配置
theme:
  name: material
  custom_dir: custom_theme 
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: 切换到亮色模式
  features:
    - content.code.copy
    - navigation.top
    - toc.follow
    - navigation.tabs
    - header.fixed        
  icon:
    repo: fontawesome/brands/github

# 
extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search:
      lang: zh