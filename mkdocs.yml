# 主题配置
theme:
  name: material
  custom_dir: custom_theme 
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切换日间模式
    - scheme: default
      primary: deep orange
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换夜间模式
  features:
    - content.code.copy
    - navigation.top
    - toc.follow
    - navigation.tabs
    - header.fixed
  icon:
    repo: fontawesome/brands/github

# 
extra_css:
  - stylesheets/extra.css
  - stylesheets/transition.css
  - stylesheets/chatbot.css

extra_javascript:
  - stylesheets/transition.js
  - stylesheets/chatbot.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search:
      lang: zh